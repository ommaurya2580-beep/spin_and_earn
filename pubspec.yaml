name: spin_and_earn
description: "Spin and Earn Flutter Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Firebase (STABLE & COMPATIBLE)
  firebase_core: ^3.15.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12

  # Google Sign-In
  google_sign_in: ^6.3.0

  # Ads
  google_mobile_ads: ^5.3.1

  # State Management
  provider: ^6.1.5+1

  # Utilities
  shared_preferences: ^2.5.4
  intl: ^0.19.0

  # SVG SUPPORT (IMPORTANT FIX)
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/google_logo.png
