name: spin_and_earn
description: "Spin and Earn Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8

  # 🔐 Google Sign-In
  google_sign_in: ^6.2.1

  # 📢 Ads
  google_mobile_ads: ^5.3.1

  # 🧠 State Management
  provider: ^6.1.5+1

  # 🍎 iOS icons
  cupertino_icons: ^1.0.8
  flutter_fortune_wheel: ^1.3.2
  rxdart: ^0.28.0
  confetti: ^0.8.0
  device_info_plus: ^10.1.2
  pinput: ^6.0.1
  country_code_picker: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  # ✅ ASSETS (VERY IMPORTANT)
  assets:
    - assets/images/

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#2A004E"
  adaptive_icon_foreground: "assets/images/app_logo.png"
